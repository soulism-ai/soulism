replicaCount: 1

image:
  repository: ghcr.io/soulism/persona-registry-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

ingress:
  enabled: false
  className: nginx
  host: persona-registry-service.soulism.local
  path: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressFromApiGateway: true
  ingressFromNginx: false

env: {}

serviceAccount:
  create: true
  name: ""
