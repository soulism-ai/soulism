apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: opensearch-down
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - default
    labelSelectors:
      app: api-gateway
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - default
      labelSelectors:
        app: opensearch
  duration: "60s"
