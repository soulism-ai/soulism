apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tool-files-service
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: tool-files-service.soulism.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tool-files-service
                port:
                  number: 3003
