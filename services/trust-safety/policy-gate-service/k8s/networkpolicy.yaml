apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-gate-service
spec:
  podSelector:
    matchLabels:
      app: policy-gate-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soulism-edge
          podSelector:
            matchLabels:
              app: api-gateway
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: soulism-platform
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - policy-gate-service
                  - risk-budget-service
                  - audit-ledger-service
                  - persona-registry-service
                  - memory-service
                  - tool-webfetch-service
                  - tool-files-service
                  - postgres
                  - redis
      ports:
        - protocol: TCP
          port: 4001
        - protocol: TCP
          port: 4002
        - protocol: TCP
          port: 4003
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
