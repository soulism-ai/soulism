openapi: 3.1.0
info:
  title: tool-files-service
  version: 0.1.0
paths:
  /health:
    get:
      operationId: health
      responses: { '200': { description: OK } }
  /files/read:
    post: { operationId: readFile, responses: { '200': { description: OK } } }
  /files/write:
    post: { operationId: writeFile, responses: { '200': { description: OK } } }
  /files/{path}:
    delete: { operationId: deleteFile, responses: { '200': { description: OK } } }
  /ready:
    get:
      operationId: ready
      responses:
        200: { description: Ready }
