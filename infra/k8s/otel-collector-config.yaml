apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: soulism
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        send_batch_size: 1024
        timeout: 1s
    exporters:
      logging:
        loglevel: info
      otlphttp:
        endpoint: https://observability.example.com/v1/otlp
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp, logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp, logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp, logging]

