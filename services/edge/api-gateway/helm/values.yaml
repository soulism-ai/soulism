replicaCount: 1

image:
  repository: ghcr.io/soulism/api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: api-gateway.soulism.local
  path: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressFromApiGateway: false
  ingressFromNginx: true

env: {}
# Example production wiring:
# env:
#   STATE_BACKEND: redis
#   STATE_REDIS_HOST: redis-master.default.svc.cluster.local
#   STATE_REDIS_PORT: "6379"
#   AUTH_MODE: jwt
#   AUTH_JWT_ISSUER: https://issuer.example
#   AUTH_JWT_AUDIENCE: control-plane
#   AUTH_JWT_JWKS_URL: https://issuer.example/.well-known/jwks.json

serviceAccount:
  create: true
  name: ""
