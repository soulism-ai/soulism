title = "soulism-secrets-scan"

[allowlist]
description = "Known-safe development and documentation patterns."
paths = [
  '''docs/''',
  '''examples/''',
  '''ci/baselines/''',
  '''.turbo/''',
  '''node_modules/'''
]
commits = []
regexes = [
  '''example(_|-)?(api|private|public|secret|token|key)''',
  '''dummy(_|-)?(api|secret|token|key)''',
  '''your[_-]?here''',
  '''changeme[_-]?secret'''
]

[[rules]]
id = "hardcoded-secret"
description = "Likely hardcoded secret material"
regex = '''(?i)(api[_-]?key|secret|token|private[_-]?key|access[_-]?key|password)\s*[:=]\s*["'][A-Za-z0-9_\\-]{24,}["']'''
entropy = 3.2

[[rules]]
id = "api-bearer-jwt"
description = "Likely Bearer or API token in code"
regex = '''(?i)(api[_-]?key|bearer|access[_-]?token|auth[_-]?token)\s*[:=]\s*["']eyJ[A-Za-z0-9_\\-]+\.[A-Za-z0-9_\\-]+\.[A-Za-z0-9_\\-]+["']'''

[[rules]]
id = "jwt-secret"
description = "Likely JWT secret token"
regex = '''eyJ[A-Za-z0-9_\\-]{20,}\.[A-Za-z0-9_\\-]{20,}\.[A-Za-z0-9_\\-]{10,}'''
[[rules]]
id = "aws-access-key-id"
description = "AWS access key"
regex = '''AKIA[0-9A-Z]{16}'''
[[rules]]
id = "rsa-private-key"
description = "Private RSA/DSA key block"
regex = '''-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'''
