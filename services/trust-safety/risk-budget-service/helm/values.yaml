replicaCount: 1

image:
  repository: ghcr.io/soulism/risk-budget-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4002
  targetPort: 4002

ingress:
  enabled: false
  className: nginx
  host: risk-budget-service.soulism.local
  path: /

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressFromApiGateway: true
  ingressFromNginx: false

env: {}
# Example production wiring:
# env:
#   STATE_BACKEND: redis
#   STATE_REDIS_HOST: redis-master.default.svc.cluster.local
#   STATE_REDIS_PORT: "6379"

serviceAccount:
  create: true
  name: ""
